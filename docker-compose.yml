version: '3.8'

services:
  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:6.0
    ports:
      - "3567:3567"
    environment:
      - SUPERTOKENS_POSTGRESQL_HOST=db
      - SUPERTOKENS_POSTGRESQL_PORT=5432
      - SUPERTOKENS_POSTGRESQL_USER=user
      - SUPERTOKENS_POSTGRESQL_PASSWORD=pass
      - SUPERTOKENS_POSTGRESQL_DATABASE=jubla_db
    depends_on:
      - db
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/jubla_db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      - db
      - redis
      - supertokens
    volumes:
      - .:/app
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=jubla_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
